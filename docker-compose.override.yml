# Development overrides for docker-compose
# This file is applied on top of docker-compose.yml when running
# `docker-compose up` (without -f flags).

services:
  backend:
    build: ./backend
    image: local-ai-backend:dev
    # enable debug mode and mount the source code for live reload
    environment:
      DEBUG: 1
    # mount only the backend sources into /app
    volumes:
      - ../local-ai-assistant/backend:/app:cached
    ports:
      - "8000:8000"
    # explicit dev command with reload
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  frontend:
    build:
      context: ./frontend
      target: dev-env
    image: local-ai-frontend:dev
    # run in development mode and mount source tree
    environment:
      NODE_ENV: development
    ports:
      - "5173:5173" # match React Router dev server port
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    expose:
      - 5173
    # mount only the frontend sources so /app/package.json exists
    volumes:
      # mount the whole frontend tree; install dependencies locally so the
      # container can pick them up from the host
      - ../local-ai-assistant/frontend:/app:cached

  ollama:
    # for development we want conservative memory/worker config
    restart: unless-stopped
    environment:
      # limit number of resident models to avoid RAM exhaustion
      OLLAMA_MAX_LOADED_MODELS: "1"
      # reduce context window/token history to cut memory usage
      OLLAMA_CONTEXT_LENGTH: "256"
      # keep memory-mapping disabled so models stream from disk
      OLLAMA_NO_MMAP: "false"
      # allow only one request at a time in dev to prevent contention
      OLLAMA_MAX_PARALLEL: "1"
      # optionally expose metrics / logging in future

  prometheus:
    image: prom/prometheus:latest
    container_name: local-ai-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ${PROMETHEUS_VOLUME_PATH:-prometheus-data}:/prometheus
    depends_on:
      - backend
      - ollama

  grafana:
    image: grafana/grafana:latest
    container_name: local-ai-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      # load any dashboards from the mounted directory on startup
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      # mount only the provisioning subdirectory (contains dashboards + datasources)
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: local-ai-redis-exporter
    environment:
      REDIS_ADDR: redis:6379
    depends_on:
      - redis

  postgres-exporter:
    image: wrouesnel/postgres_exporter:latest
    container_name: local-ai-postgres-exporter
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    depends_on:
      - postgres

  node-exporter:
    image: prom/node-exporter:latest
    container_name: local-ai-node-exporter
    ports:
      - "9100:9100"

  loki:
    image: grafana/loki:latest
    container_name: local-ai-loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki/config.yaml:/etc/loki/local-config.yaml:ro
      - ${LOKI_DATA_VOLUME_PATH:-loki-data}:/loki
      - ${LOKI_DATA_VOLUME_PATH:-loki-data}:/wal
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:latest
    container_name: local-ai-promtail
    volumes:
      - /var/log:/var/log
      - ./promtail/config.yaml:/etc/promtail/config.yaml:ro
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      - loki
