<svg width="200" height="50" viewBox="0 0 200 50" xmlns="http://www.w3.org/2000/svg">
  <!-- rounded square with gradient -->
  <defs>
    <linearGradient id="gradLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9333ea;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="50" height="50" rx="12" fill="url(#gradLight)" />
  <!-- stylized AI chip / chat bubble -->
  <path d="M15 20 h20 v10 h-10 l-5 5 v-5 h-5 z" fill="#fff" />
  <!-- text label with slight weight -->
  <text x="60" y="33" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="600" fill="#111">Local AI</text>
</svg>
