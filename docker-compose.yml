services:
  postgres:
    image: postgres:16
    container_name: local-ai-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data   # use a named volume rather than host bind-mount
    ports:
      - "5432:5432"

  ollama:
    image: ollama/ollama:latest
    container_name: local-ai-ollama
    ports:
      - "11434:11434"
    volumes:
      - ${OLLAMA_VOLUME_PATH}:/root/.ollama
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    container_name: local-ai-ollama-init
    depends_on:
      - ollama
    volumes:
      - ${OLLAMA_VOLUME_PATH}:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "until ollama list; do
         echo 'waiting for ollama...';
         sleep 5;
       done &&
       ollama pull phi3:mini &&
       ollama pull gemma:2b"

  backend:
    build: ./backend
    container_name: local-ai-backend
    volumes:
      - ${BACKEND_VOLUME_PATH}:/app/data
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${POSTGRES_URL}
      - OLLAMA_URL=${OLLAMA_URL}
    depends_on:
      - postgres
      - ollama

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: local-ai-frontend
    working_dir: /app
    volumes:
      - ${FRONTEND_VOLUME_PATH}:/usr/src/app/data
      - /app/node_modules # keep node_modules in container to avoid host/contests conflicts
    stdin_open: true
    tty: true
    depends_on:
      - backend

volumes:
  pgdata:
