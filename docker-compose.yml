services:
  backend:
    build: ./backend
    container_name: local-ai-backend
    ports:
      - "8080:8000" # Map host port 8080 to container port 8000
    environment:
      - OLLAMA_URL=http://ollama:11434
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    container_name: local-ai-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "until ollama list; do
         echo 'waiting for ollama...';
         sleep 5;
       done &&
       ollama pull phi3:mini &&
       ollama pull gemma:2b"


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: local-ai-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    stdin_open: true
    tty: true

volumes:
  ollama-data:
