services:
  postgres:
    image: postgres:16
    container_name: local-ai-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data   # use a named volume rather than host bind-mount
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: local-ai-redis
    ports:
      - "6379:6379"
    volumes:
      - ${REDISDATA_VOLUME_PATH:-redis_data}:/data

  loki:
    image: grafana/loki:latest
    container_name: local-ai-loki
    ports:
      - "3100:3100"
    volumes:
      - ${LOKI_DATA_VOLUME_PATH:-loki_data}:/loki/data
    command: -config.file=/etc/loki/local-config.yaml

  ollama:
    image: ollama/ollama:latest
    container_name: local-ai-ollama
    ports:
      - "11434:11434"
    volumes:
      - ${OLLAMA_VOLUME_PATH:-ollama_data}:/root/.ollama
    restart: unless-stopped
    # persistently tune Ollama for minimal memory use across environments
    environment:
      # keep only one resident model resident in memory at a time
      OLLAMA_MAX_LOADED_MODELS: "1"
      # shrink default context length; frontend controls prompt size so 1‑2k is fine
      OLLAMA_CONTEXT_LENGTH: "1024"
      # limit parallelism to avoid contention on low‑RAM hosts
      OLLAMA_NUM_PARALLEL: "1"
      # additional settings can be adjusted in override for dev/test

  ollama-init:
    image: ollama/ollama:latest
    container_name: local-ai-ollama-init
    depends_on:
      - ollama
    volumes:
      - ${OLLAMA_VOLUME_PATH:-ollama_data}:/root/.ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_DEFAULT_MODEL: ${OLLAMA_DEFAULT_MODEL:-llama3.2:3b}
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "until ollama list; do
         echo 'waiting for ollama...';
         sleep 5;
       done &&
       ollama pull ${OLLAMA_DEFAULT_MODEL:-llama3.2:3b} &&
       ollama pull gemma2:2b"

  backend:
    build: ./backend
    container_name: local-ai-backend
    volumes:
      # allow backend to talk to Docker daemon for log retrieval
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      PYTHONPATH: /app
      POSTGRES_URL: ${BACKEND_POSTGRES_URL:-postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}}
      DATABASE_URL: ${BACKEND_POSTGRES_URL:-postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}}
      OLLAMA_URL: ${OLLAMA_URL}
      OLLAMA_REQUEST_TIMEOUT_SECONDS: ${OLLAMA_REQUEST_TIMEOUT_SECONDS:-300}
      OLLAMA_STREAM_CONNECT_TIMEOUT_SECONDS: ${OLLAMA_STREAM_CONNECT_TIMEOUT_SECONDS:-10}
      OLLAMA_STREAM_READ_TIMEOUT_SECONDS: ${OLLAMA_STREAM_READ_TIMEOUT_SECONDS:-600}
      OLLAMA_WARMUP_TIMEOUT_SECONDS: ${OLLAMA_WARMUP_TIMEOUT_SECONDS:-90}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-15m}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      OLLAMA_DEFAULT_MODEL: ${OLLAMA_DEFAULT_MODEL:-llama3.2:3b}
      REDIS_CACHE_TTL_SECONDS: ${REDIS_CACHE_TTL_SECONDS:-3600}
      REDIS_SESSION_TTL_SECONDS: ${REDIS_SESSION_TTL_SECONDS:-86400}
      REDIS_STREAM_TTL_SECONDS: ${REDIS_STREAM_TTL_SECONDS:-300}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-30}
    depends_on:
      - postgres
      - redis
      - ollama

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: local-ai-frontend
    working_dir: /app
    volumes:
      - /app/node_modules # keep node_modules in container to avoid host/contests conflicts
    stdin_open: true
    tty: true
    depends_on:
      - backend

volumes:
  pgdata:
  ollama_data:
  redis_data:
  loki_data:
  prometheus_data:
