events {}

http {
  server {
    listen 3000;

    # Proxy frontend app
    location / {
      proxy_pass http://frontend:3000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
    }

    # Proxy backend API (standardized /api/ prefix)
    location /api/chat_stream {
      rewrite ^/api/(.*)$ /$1 break;
      proxy_pass http://backend:8000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
    }
    location /api/chat {
      rewrite ^/api/(.*)$ /$1 break;
      proxy_pass http://backend:8000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }
    location /api/ {
      # forward all /api/ requests to backend, stripping the prefix
      rewrite ^/api/(.*)$ /$1 break;
      proxy_pass http://backend:8000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }
  }
}
